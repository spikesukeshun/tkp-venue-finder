<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TKP 会場ファインダー ｜ 貸会議室 提案ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF9F6; --surface:#FFFFFF; --surface-2:#F4F2EC;
  --ink:#1A1A1A; --ink-soft:#5A574F; --ink-faint:#908C82;
  --line:#E7E4DD; --line-strong:#D8D4CA;
  --accent:#D90012; --accent-soft:#F7E7E8;
  --gold:#B0965F;
  --radius:14px; --radius-sm:9px;
  --serif:'Shippori Mincho',"Hiragino Mincho ProN","Yu Mincho",serif;
  --sans:'Zen Kaku Gothic New',-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  --shadow:0 1px 2px rgba(30,25,15,.04),0 8px 24px rgba(30,25,15,.05);
  --shadow-lg:0 4px 12px rgba(30,25,15,.08),0 24px 60px rgba(30,25,15,.10);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:400;line-height:1.7;-webkit-font-smoothing:antialiased;letter-spacing:.01em}
h1,h2,h3,.serif{font-family:var(--serif);font-weight:600;letter-spacing:.02em;line-height:1.35}
button{font-family:inherit;cursor:pointer;color:inherit}
a{color:inherit}
input,select{font-family:inherit;font-size:14px;color:var(--ink)}
.label{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.hidden{display:none!important}

/* ── Top bar ── */
.topbar{position:sticky;top:0;z-index:40;background:rgba(250,249,246,.86);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line);}
.topbar-in{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:baseline;gap:10px;flex:1;min-width:0}
.brand .mark{font-family:var(--serif);font-weight:700;font-size:19px;letter-spacing:.04em;white-space:nowrap}
.brand .mark b{color:var(--accent);font-weight:700}
.brand .sub{font-size:11px;color:var(--ink-faint);letter-spacing:.14em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-actions{display:flex;gap:8px;align-items:center}
.btn{border:1px solid var(--line-strong);background:var(--surface);border-radius:100px;padding:8px 16px;font-size:12.5px;font-weight:500;letter-spacing:.04em;transition:.18s;white-space:nowrap}
.btn:hover{border-color:var(--ink);}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:#000}
.btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ink-soft)}
.btn.ghost:hover{color:var(--ink)}
.btn:disabled{opacity:.4;cursor:default}
.btn .ic{font-size:13px;margin-right:5px}

/* ── Layout ── */
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
.hero{padding:40px 0 22px;border-bottom:1px solid var(--line)}
.hero .ey{color:var(--gold);letter-spacing:.24em;font-size:11px;font-weight:500;text-transform:uppercase}
.hero h1{font-size:31px;margin:12px 0 8px}
.hero p{color:var(--ink-soft);font-size:14px;max-width:640px;margin:0}

/* ── Filter ── */
.filters{position:sticky;top:57px;z-index:30;background:rgba(250,249,246,.92);backdrop-filter:blur(10px);padding:16px 0 14px;border-bottom:1px solid var(--line)}
.filter-row{display:flex;flex-wrap:wrap;gap:14px 18px;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:6px}
.field select,.field input{border:1px solid var(--line-strong);background:var(--surface);border-radius:var(--radius-sm);padding:9px 12px;min-width:150px;transition:.15s}
.field select:focus,.field input:focus{outline:none;border-color:var(--ink)}
.field.grow{flex:1;min-width:180px}
.field.grow input{width:100%}
.brands{display:flex;flex-wrap:wrap;gap:6px}
.pill{border:1px solid var(--line-strong);background:var(--surface);border-radius:100px;padding:6px 13px;font-size:12px;color:var(--ink-soft);transition:.15s;user-select:none}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pill:hover{border-color:var(--ink)}

/* ── Status ── */
.status{display:flex;align-items:center;gap:14px;padding:16px 0 4px;flex-wrap:wrap}
.status .count{font-family:var(--serif);font-size:15px}
.status .count b{color:var(--accent);font-weight:700}
.status .prog{font-size:11.5px;color:var(--ink-faint);display:flex;align-items:center;gap:7px}
.spin{width:12px;height:12px;border:2px solid var(--line-strong);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── Grid / cards ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:18px;padding:16px 0 130px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:.2s;position:relative}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--line-strong)}
.card .thumb{aspect-ratio:3/2;background:var(--surface-2);position:relative;overflow:hidden}
.card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
.card .thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:11px;letter-spacing:.1em}
.card .btag{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.94);border-radius:100px;padding:3px 10px;font-size:10.5px;font-weight:500;letter-spacing:.06em;color:var(--ink)}
.card .btag.premium{background:var(--ink);color:#fff}
.card .btag.premium::before{content:"◆ ";color:var(--gold)}
.card .body{padding:14px 15px 15px;display:flex;flex-direction:column;gap:9px;flex:1}
.card h3{font-size:15px;line-height:1.4;margin:0}
.card .stn{font-size:11.5px;color:var(--ink-soft);display:flex;gap:5px;align-items:flex-start}
.card .stn .ic{color:var(--accent);flex-shrink:0}
.card .specs{display:flex;gap:14px;margin-top:auto;padding-top:10px;border-top:1px solid var(--line)}
.card .specs .s{display:flex;flex-direction:column;gap:1px}
.card .specs .s .v{font-family:var(--serif);font-size:15px;font-weight:600;line-height:1}
.card .specs .s .v small{font-size:10px;color:var(--ink-faint);font-family:var(--sans);margin-left:1px}
.card .specs .s .k{font-size:9.5px;color:var(--ink-faint);letter-spacing:.08em}
.card .specs .loading{font-size:11px;color:var(--ink-faint);display:flex;align-items:center;gap:6px}
.card .add{position:absolute;bottom:14px;right:14px;width:34px;height:34px;border-radius:50%;border:1px solid var(--line-strong);background:var(--surface);font-size:19px;line-height:1;display:flex;align-items:center;justify-content:center;transition:.18s;padding:0;color:var(--ink)}
.card .add:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.card.picked{border-color:var(--ink)}
.card.picked .add{background:var(--accent);color:#fff;border-color:var(--accent)}
.card .price{font-size:11.5px;color:var(--ink-soft)}
.card .price b{font-family:var(--serif);color:var(--ink);font-weight:600}

.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--ink-faint)}
.empty .big{font-family:var(--serif);font-size:18px;color:var(--ink-soft);margin-bottom:8px}
.errbox{grid-column:1/-1;background:var(--accent-soft);border:1px solid #eecccd;border-radius:var(--radius);padding:20px 22px;color:#8a1015}
.errbox b{font-weight:700}

/* ── Selection tray ── */
.tray{position:fixed;left:0;right:0;bottom:0;z-index:35;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line-strong);box-shadow:0 -8px 30px rgba(30,25,15,.06);transform:translateY(105%);transition:.28s cubic-bezier(.2,.7,.2,1)}
.tray.show{transform:translateY(0)}
.tray-in{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
.tray .lead{font-family:var(--serif);font-size:14px;white-space:nowrap}
.tray .lead b{color:var(--accent);font-weight:700}
.chips{display:flex;gap:8px;overflow-x:auto;flex:1;padding:2px 0}
.chip{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:100px;padding:6px 8px 6px 13px;font-size:12px;white-space:nowrap}
.chip button{border:none;background:none;font-size:15px;color:var(--ink-faint);line-height:1;padding:0 2px}
.chip button:hover{color:var(--accent)}
.tray .acts{display:flex;gap:8px;white-space:nowrap}

/* ── Modal ── */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(26,24,20,.5);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;opacity:0;pointer-events:none;transition:.2s}
.overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--bg);border-radius:18px;max-width:900px;width:100%;overflow:hidden;box-shadow:var(--shadow-lg);transform:translateY(12px);transition:.24s}
.overlay.show .modal{transform:none}
.modal-head{padding:24px 28px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:16px;position:relative}
.modal-head h2{font-size:22px;margin:0 0 6px}
.modal-head .close{position:absolute;top:18px;right:20px;width:34px;height:34px;border-radius:50%;border:1px solid var(--line-strong);background:var(--surface);font-size:18px;display:flex;align-items:center;justify-content:center;padding:0}
.modal-body{padding:22px 28px 30px}
.gallery{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:24px}
.gallery .main{aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;background:var(--surface-2)}
.gallery .main img{width:100%;height:100%;object-fit:cover}
.thumbs{display:flex;gap:8px;overflow-x:auto}
.thumbs img{width:78px;height:56px;object-fit:cover;border-radius:7px;cursor:pointer;opacity:.6;border:2px solid transparent;transition:.15s;flex-shrink:0}
.thumbs img.on,.thumbs img:hover{opacity:1;border-color:var(--ink)}
.sect{margin-bottom:26px}
.sect > .label{display:block;margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--line)}
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{background:var(--surface-2);border-radius:6px;padding:4px 11px;font-size:11.5px;color:var(--ink-soft)}
.desc{font-size:13.5px;color:var(--ink-soft);line-height:1.9}
.acc{font-size:13px;color:var(--ink-soft);line-height:1.9}
.acc .addr{color:var(--ink);margin-bottom:8px}
.mapf{width:100%;aspect-ratio:16/8;border:1px solid var(--line);border-radius:var(--radius);margin-top:12px;background:var(--surface-2)}
.vmap{margin-top:10px}
.vmap .mapimg,.mapimg{width:100%;display:block;border:1px solid var(--line);border-radius:var(--radius)}
.rooms tr.row-off td{opacity:.38}
.rooms tr.row-off td.rmchk{opacity:1}
.roomedit-hint{font-weight:400;color:var(--ink-faint);letter-spacing:0;font-size:10.5px}
.onestop-sec .onestop-img{width:100%;display:block;border-radius:var(--radius);border:1px solid var(--line)}
.rooms{width:100%;border-collapse:collapse;font-size:12.5px}
.rooms th,.rooms td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
.rooms th{font-weight:500;color:var(--ink-faint);font-size:10.5px;letter-spacing:.06em;text-align:right;position:sticky}
.rooms th:first-child,.rooms td:first-child{text-align:left}
.rooms td.nm{font-weight:500;color:var(--ink)}
.rooms td.pr{font-family:var(--serif);color:var(--accent);font-weight:600}
.rooms tr:hover td{background:var(--surface)}
.rooms-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius)}
.rooms td.rmchk,.rooms th:first-child{text-align:center;width:40px}
.rooms td.rmchk input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;margin:0}
.roomsel-hint{font-size:11px;color:var(--ink-faint);margin:-4px 0 10px}
.roomselall{border:1px solid var(--line-strong);background:var(--surface);border-radius:100px;padding:2px 10px;font-size:10.5px;color:var(--ink-soft);margin-left:2px;transition:.15s}
.roomselall:hover{border-color:var(--ink);color:var(--ink)}
.roomcap{font-size:11px;letter-spacing:.06em;color:var(--gold);margin-bottom:7px;font-weight:500}
.acc-line{font-size:12px;color:var(--ink-soft);line-height:1.7}
.acc .addr i{color:var(--accent);font-style:normal;margin-right:3px}
.md-add{margin-top:8px}

/* ── Comparison ── */
.cmp-wrap{overflow-x:auto}
.cmp{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
.cmp th,.cmp td{padding:14px 16px;border-bottom:1px solid var(--line);text-align:center;vertical-align:top}
.cmp th{background:var(--surface);text-align:left;font-weight:500;color:var(--ink-faint);font-size:11px;letter-spacing:.08em;width:120px;white-space:nowrap}
.cmp thead td{font-family:var(--serif);font-size:15px;font-weight:600;background:var(--surface)}
.cmp .big{font-family:var(--serif);font-size:20px;font-weight:600}
.cmp .best{color:var(--accent)}
.cmp td .sm{font-size:11px;color:var(--ink-faint);display:block}

/* ── Customer proposal view ── */
#customerView{padding-bottom:80px}
.cust-bar{position:sticky;top:0;z-index:20;background:rgba(250,249,246,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 0}
.cust-bar .wrap{display:flex;align-items:center;gap:12px}
.cover{padding:70px 0 54px;border-bottom:2px solid var(--ink);position:relative}
.cover .ey{color:var(--gold);letter-spacing:.3em;font-size:11px;text-transform:uppercase;font-weight:500}
.cover h1{font-size:38px;margin:18px 0 26px;line-height:1.3}
.cover .to{font-size:19px;font-family:var(--serif);border-left:2px solid var(--accent);padding-left:14px;margin-bottom:30px}
.cover .to input{border:none;background:transparent;font-family:var(--serif);font-size:19px;width:auto;min-width:260px;padding:2px 0;border-bottom:1px dashed var(--line-strong)}
.cover .meta{display:flex;gap:40px;flex-wrap:wrap;font-size:13px;color:var(--ink-soft)}
.cover .meta .label{display:block;margin-bottom:4px}
.cover .meta input{border:none;border-bottom:1px dashed var(--line-strong);background:transparent;padding:2px 0;min-width:140px}
.cust-sec{padding:52px 0;border-bottom:1px solid var(--line)}
.cust-sec > .label{display:block;color:var(--gold);margin-bottom:6px}
.cust-sec h2{font-size:26px;margin:0 0 26px}
.venue-block{padding:46px 0;border-bottom:1px solid var(--line)}
.venue-block:last-child{border-bottom:none}
.venue-block .vn{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
.venue-block .vn .num{font-family:var(--serif);color:var(--gold);font-size:26px}
.venue-block .vn h2{font-size:24px;margin:0}
.venue-block .vsub{font-size:13px;color:var(--ink-soft);margin-bottom:22px}
.vgrid{display:grid;grid-template-columns:1fr 1.1fr;gap:26px;align-items:start}
.vgrid > div{min-width:0}
.vgrid .photo{aspect-ratio:4/3;border-radius:var(--radius);overflow:hidden;background:var(--surface-2)}
.vgrid .photo img{width:100%;height:100%;object-fit:cover}
.vphotos{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.vphotos img{aspect-ratio:3/2;object-fit:cover;border-radius:8px;width:100%}
.print-hint{font-size:11px;color:var(--ink-faint)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:100px;font-size:13px;z-index:80;opacity:0;pointer-events:none;transition:.25s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:720px){
  .wrap,.topbar-in,.tray-in{padding-left:16px;padding-right:16px}
  .hero h1{font-size:25px}
  .cover h1{font-size:28px}
  .vgrid{grid-template-columns:1fr}
  .brand .sub{display:none}
  .field select,.field input{min-width:120px}
  .field.grow{min-width:140px;flex-basis:100%}
  .modal-body{padding:18px 18px 26px}
  .modal-head{padding:20px 20px 16px}
  .cover .meta{gap:20px}
  .tray-in{flex-wrap:wrap}
  .tray .acts{width:100%}
  .tray .acts .btn{flex:1}
  .print-hint{display:none}
  .cover h1{font-size:26px}
  .cover .to input{min-width:180px}
  .brand .mark{font-size:16px}
  .mark-rest{display:none}
  .top-actions .btn{padding:7px 11px;font-size:11.5px}
  .cmp th{width:88px}
}
@media print{
  .topbar,.filters,.tray,.cust-bar,.overlay,.hero,#browseView{display:none!important}
  body{background:#fff}
  .cover .to input,.cover .meta input{border:none}
  .venue-block,.cust-sec{page-break-inside:avoid}
  .print-hide{display:none!important}
  .rooms tr.row-off{display:none!important}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <div class="brand">
      <span class="mark"><b>TKP</b> <span class="mark-rest">会場ファインダー</span></span>
      <span class="sub">VENUE FINDER ＆ PROPOSAL</span>
    </div>
    <div class="top-actions">
      <button class="btn ghost hidden" id="pptBtn" title="選択内容をPowerPointで出力">📊 PPTX出力</button>
      <button class="btn ghost hidden" id="printBtn" title="提案書としてPDF/印刷">🖨 印刷 / PDF</button>
      <button class="btn ghost" id="shareBtn" title="この選択を共有URLにする">🔗 共有URL</button>
      <button class="btn primary" id="modeBtn" disabled>顧客共有モード</button>
    </div>
  </div>
</div>

<!-- ══ 検討モード ══ -->
<section id="browseView">
  <div class="wrap">
    <div class="hero">
      <div class="ey">Nationwide · Real-time</div>
      <h1>全国のTKP会場から、最適な一室を。</h1>
      <p>エリア・ブランド・収容人数で会場を絞り込み、比較検討。気になる会場を選んで、そのまま顧客提案ページに切り替えられます。データは <b>kashikaigishitsu.net</b> からリアルタイムで取得します。</p>
    </div>
  </div>

  <div class="filters">
    <div class="wrap">
      <div class="filter-row">
        <div class="field"><span class="label">地方</span>
          <select id="fRegion"><option value="">選択</option></select></div>
        <div class="field"><span class="label">都道府県</span>
          <select id="fPref" disabled><option value="">—</option></select></div>
        <div class="field"><span class="label">エリア</span>
          <select id="fSub" disabled><option value="">すべて</option></select></div>
        <div class="field"><span class="label">最大収容（下限）</span>
          <select id="fCap">
            <option value="0">指定なし</option>
            <option value="10">10名以上</option>
            <option value="30">30名以上</option>
            <option value="50">50名以上</option>
            <option value="100">100名以上</option>
            <option value="200">200名以上</option>
            <option value="300">300名以上</option>
          </select></div>
        <div class="field grow"><span class="label">キーワード・駅名</span>
          <input id="fKw" type="search" placeholder="会場名・最寄駅で検索"></div>
      </div>
      <div class="filter-row" style="margin-top:12px">
        <div class="field" style="width:100%">
          <span class="label">ブランド</span>
          <div class="brands" id="fBrands"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="status">
      <div class="count" id="count">地方・都道府県を選んで会場を表示</div>
      <div class="prog hidden" id="prog"></div>
    </div>
    <div class="grid" id="grid">
      <div class="empty">
        <div class="big">エリアを選択してください</div>
        <div>まず「地方」→「都道府県」を選ぶと、その地域の会場をリアルタイムで取得します。</div>
      </div>
    </div>
  </div>
</section>

<!-- ══ 顧客共有モード ══ -->
<section id="customerView" class="hidden">
  <div class="wrap" id="custContent"></div>
</section>

<!-- Modal -->
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script>
"use strict";
/* ============================================================
   TKP 会場ファインダー  —  完全クライアントサイド / リアルタイム取得

/* ── プロキシ層 ── */
/* 複数の公開CORSプロキシ。1本が混雑/停止(429等)でも他で取得できるよう
   2本ずつ並列レース(Promise.any)し、最初に成功したものを採用する */
const PROXIES = [
  u => "https://cors.eu.org/" + u,
  u => "https://api.cors.lol/?url=" + encodeURIComponent(u),
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  u => "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(u),
  u => "https://thingproxy.freeboard.io/fetch/" + u,
];
const TTL = 15*60*1000;
const memCache = new Map();
function _fetchProxy(purl, ms){
  return new Promise((resolve,reject)=>{
    const ctrl = new AbortController();
    const to = setTimeout(()=>{ ctrl.abort(); reject(new Error("timeout")); }, ms);
    fetch(purl,{signal:ctrl.signal}).then(async r=>{
      clearTimeout(to);
      if(!r.ok) return reject(new Error("HTTP "+r.status));
      const html = await r.text();
      if(!html || html.length < 800) return reject(new Error("empty"));
      resolve(html);
    }).catch(e=>{ clearTimeout(to); reject(e); });
  });
}
async function proxyFetch(url){
  const hit = memCache.get(url);
  if(hit && Date.now()-hit.t < TTL) return hit.html;
  try{
    const raw = localStorage.getItem("kk:"+url);
    if(raw){ const o = JSON.parse(raw); if(Date.now()-o.t < TTL){ memCache.set(url,o); return o.html; } }
  }catch(e){}
  let lastErr;
  for(let i=0;i<PROXIES.length;i+=2){
    const group = PROXIES.slice(i,i+2).map(mk=>_fetchProxy(mk(url), 9000));
    try{
      const html = await Promise.any(group);
      const rec = {t:Date.now(), html};
      memCache.set(url, rec);
      try{ if(html.length < 550000) localStorage.setItem("kk:"+url, JSON.stringify(rec)); }catch(e){}
      return html;
    }catch(e){ lastErr = (e && e.errors) ? e.errors[e.errors.length-1] : e; }
  }
  throw lastErr || new Error("all proxies failed");
}
const parseHTML = html => new DOMParser().parseFromString(html, "text/html");

/* ── テキスト抽出ヘルパ（BeautifulSoup get_text(separator) 相当）── */
function nodeText(el, sep){
  const doc = el.ownerDocument || document;
  const w = doc.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  const parts = []; let n;
  while((n = w.nextNode())){ const t = (n.nodeValue||"").trim(); if(t) parts.push(t); }
  return parts.join(sep);
}
const JP_RE = new RegExp("[\\u3040-\\u309f\\u30a0-\\u30ff\\u4e00-\\u9faf]");
const hasJapanese = s => JP_RE.test(s||"");
function brandOf(name){
  if(/PREMIUM/i.test(name)) return "PREMIUM";
  if(/fabbit/i.test(name)) return "fabbit";
  if(/CIRQ/i.test(name)) return "CIRQ";
  if(/cabin/i.test(name)) return "cabin";
  if(/TKP/.test(name)) return "TKP";
  return "その他";
}
const yen = n => "¥" + Number(n).toLocaleString("ja-JP");
function priceStr(mn, mx){
  if(mn && mx && mn!==mx) return yen(mn)+" 〜 "+yen(mx);
  if(mn) return yen(mn);
  return "—";
}
function roomPrice(r){
  if(r.priceMin>0) return priceStr(r.priceMin, r.priceMax);
  if(r.ask) return "お問い合わせ";
  return "—";
}

/* ── 施設一覧パース（scraper._extract_facilities_from_soup + _parse_card_text）── */
function parseCardText(text, id){
  const parts = text.split("|").map(s=>s.trim()).filter(Boolean);
  let name="", station="";
  for(const p of parts){
    if(!name && (p.startsWith("TKP")||p.startsWith("fabbit")||p.startsWith("CIRQ")||p.startsWith("cabin")
        || ["ホール","スクエア","センター","ビル","タワー","プラザ"].some(k=>p.includes(k)))){
      if(p.length>3 && !/\d+名/.test(p) && !p.includes("㎡")) name = p;
    }
    if(!station && (p.includes("徒歩")||p.includes("直結")) && p.includes("駅")) station = p;
  }
  if(!name) name = id;
  return {name, station};
}
function parseAreaList(doc){
  const seen = new Set(), out = [];
  doc.querySelectorAll('a[href*="/facilitys/"]').forEach(a=>{
    const href = a.getAttribute("href")||"";
    const m = href.match(/\/facilitys\/([^/]+)\//);
    if(!m) return;
    const id = m[1];
    if(seen.has(id)) return; seen.add(id);
    let card = a, cardText = "";
    for(let i=0;i<7;i++){
      card = card.parentElement; if(!card) break;
      const t = nodeText(card, "|");
      if(t.includes("徒歩")||t.includes("直結")||t.includes("分")){ cardText = t; break; }
    }
    const {name, station} = parseCardText(cardText, id);
    out.push({id, name, station, brand:brandOf(name), url:BASE+"/facilitys/"+id+"/"});
  });
  return out.filter(f => !f.name.includes("リージャス") && hasJapanese(f.name.replace(/TKP/g,"")));
}
function getMaxPage(doc){
  let mp = 1;
  doc.querySelectorAll('a[href*="?page="]').forEach(a=>{
    const m = (a.getAttribute("href")||"").match(/\?page=(\d+)/);
    if(m){ const p = +m[1]; if(p>mp) mp = p; }
  });
  return mp;
}
function parseSubAreas(doc, path){
  const baseName = path.split("/").pop();
  const seenNames = new Set(), out = [];
  doc.querySelectorAll("a[href]").forEach(a=>{
    let href = a.getAttribute("href")||"";
    const inArea = href.includes("/area/"+path+"/") || href.startsWith("/"+baseName+"/");
    if(!inArea) return;
    if(href === "/area/"+path+"/" || href === "/"+baseName+"/") return;
    if(href.includes("purpose-") || href.includes("?page=")) return;
    const name = a.textContent.trim();
    if(!name || name.length>18 || seenNames.has(name)) return;
    if(!hasJapanese(name)) return;
    if(href.startsWith("/"+baseName+"/")) href = "/area"+href;
    seenNames.add(name); out.push({path:href, name});
  });
  return out;
}

/* ── 施設詳細パース（scraper._parse_facility_html / _parse_rooms）── */
function parseRoomTokens(name, tokens){
  const room = {name, floor:"", area:0, ceiling:0, priceMin:0, priceMax:0, ask:false, caps:{}};
  if(tokens[0] === name) tokens = tokens.slice(1);
  if(tokens[0] && tokens[0].includes("階")){ room.floor = tokens[0]; tokens = tokens.slice(1); }
  let li = 0; const rest = [];
  for(const tk of tokens){
    if(li >= LAYOUT_ORDER.length){ rest.push(tk); continue; }
    if(tk === "-"){ room.caps[LAYOUT_ORDER[li]] = 0; li++; }
    else if(/^\d+名$/.test(tk)){ room.caps[LAYOUT_ORDER[li]] = parseInt(tk,10); li++; }
    else rest.push(tk);
  }
  for(let i=0;i<rest.length;i++){
    const tk = rest[i];
    if(/^\d+\.?\d*$/.test(tk)){
      const nx = rest[i+1]||"";
      if(nx==="㎡"){ room.area = parseFloat(tk); i++; continue; }
      if(nx==="m"){ room.ceiling = parseFloat(tk); i++; continue; }
    }
    if(tk.includes("¥")||tk.includes("￥")){
      const nums = (tk.match(/[\d,]+/g)||[]).map(s=>s.replace(/,/g,"")).filter(s=>s.length>=4).map(Number);
      if(nums.length>=2){ room.priceMin = nums[0]; room.priceMax = nums[nums.length-1]; }
      else if(nums.length===1){ room.priceMin = room.priceMax = nums[0]; }
    }
    if(tk.includes("問い合わせ")||tk.includes("応相談")) room.ask = true;
  }
  const maxCap = room.caps["最大収容"]||0;
  return (maxCap>0 || room.area>0) ? room : null;
}
function parseRooms(doc){
  const rooms = [];
  const links = [...doc.querySelectorAll("a")].filter(a=>{
    const c = a.getAttribute("class")||"";
    return c.includes("leading-[22px]") && c.includes("[text-decoration:underline]");
  });
  links.forEach(link=>{
    const name = link.textContent.trim();
    if(!name) return;
    let row = link, found = false;
    for(let i=0;i<5;i++){ row = row.parentElement; if(!row) break; if((row.getAttribute("class")||"").includes("w-[1000px]")){ found = true; break; } }
    if(!found) return;
    const tokens = nodeText(row,"|").split("|").map(s=>s.trim()).filter(Boolean);
    const room = parseRoomTokens(name, tokens);
    if(room) rooms.push(room);
  });
  return rooms;
}
const IMG_OK = u => /^https:\/\/[^/]*kashikaigishitsu\.net\//.test(u) && !/(recommend|topics|campaign|badge)/.test(u);
function parseImages(doc){
  const seen = new Set(), out = [];
  const push = src => {
    if(!src) return;
    const b = src.split("?")[0];
    if(!IMG_OK(b) || seen.has(b)) return;
    seen.add(b); out.push(b);
  };
  const og = doc.querySelector('meta[property="og:image"]');
  if(og) push(og.getAttribute("content"));
  doc.querySelectorAll("img").forEach(im=>{ const s = im.getAttribute("src")||""; if(s.includes("/assets/")) push(s); });
  return out.slice(0,8);
}
const FEATURE_KW = ["パーティー","エレベーター","スタッフ常駐","デザイン","バリアフリー","駅近","雨に濡れない","喫煙所","ホテル","ネット回線","Wi-Fi","早朝","深夜","搬入"];
function parseFeatures(doc){
  const seen = new Set(), out = [];
  const w = doc.createTreeWalker(doc.body||doc.documentElement, NodeFilter.SHOW_TEXT);
  let n;
  while((n = w.nextNode())){
    const t = (n.nodeValue||"").trim();
    if(t && t.length<25 && FEATURE_KW.some(k=>t.includes(k)) && !seen.has(t)){ seen.add(t); out.push(t); }
  }
  return out.slice(0,8);
}
function parseAccess(doc){
  const re = /(メトロ|JR|都営|東急|小田急|阪急|地下鉄|近鉄|名鉄|西鉄|市営|モノレール)/;
  const seen = new Set(), out = [];
  const w = doc.createTreeWalker(doc.body||doc.documentElement, NodeFilter.SHOW_TEXT);
  let n;
  while((n = w.nextNode())){
    const t = (n.nodeValue||"").trim();
    if(t && t.length<90 && re.test(t) && t.includes("駅") && (t.includes("分")||t.includes("直結")||t.includes("出口")) && !seen.has(t)){ seen.add(t); out.push(t); }
  }
  return out;
}
function parseAddress(doc){
  const w = doc.createTreeWalker(doc.body||doc.documentElement, NodeFilter.SHOW_TEXT);
  let n;
  while((n = w.nextNode())){
    if((n.nodeValue||"").includes("〒")){
      let p = n.parentElement;
      for(let i=0;i<5 && p;i++){
        p = p.parentElement; if(!p) break;
        const t = nodeText(p," ");
        if(/[都道府県]/.test(t) && t.length>15) return t.replace(/\s+/g," ").trim().slice(0,110);
      }
    }
  }
  return "";
}
function parseDesc(doc){
  const els = doc.querySelectorAll("p,div");
  for(const el of els){
    const t = el.textContent.trim();
    if(t.length>30 && t.length<420 && t.includes("は、")) return t.slice(0,220);
  }
  return "";
}
function parseDetail(doc, id, url){
  const h1 = doc.querySelector("h1");
  const rooms = parseRooms(doc);
  const maxCap = rooms.reduce((m,r)=>Math.max(m, r.caps["最大収容"]||0), 0);
  return {
    id, url,
    name: h1 ? h1.textContent.trim() : "",
    images: parseImages(doc),
    address: parseAddress(doc),
    access: parseAccess(doc),
    features: parseFeatures(doc),
    description: parseDesc(doc),
    mapEmbed: (()=>{ const f=doc.querySelector('iframe[src*="google.com/maps/embed"]'); return f? (f.getAttribute("src")||"") : ""; })(),
    rooms, maxCap, roomCount: rooms.length,
  };
}

/* ── 詳細取得キュー（並列数制限） ── */
const detail = new Map();      // id -> detail object | "loading" | "error"
let dq = [], active = 0; const MAX_CONC = 3;
function enqueueDetail(fac){
  if(detail.has(fac.id)) return;
  detail.set(fac.id, "loading");
  dq.push(fac); pumpQueue();
}
function pumpQueue(){
  while(active < MAX_CONC && dq.length){
    const fac = dq.shift(); active++;
    (async()=>{
      try{
        const doc = parseHTML(await proxyFetch(fac.url));
        const d = parseDetail(doc, fac.id, fac.url);
        if(!d.name) d.name = fac.name;
        d.station = fac.station || d.access[0] || "";
        d.brand = fac.brand || brandOf(d.name);
        detail.set(fac.id, d);
      }catch(e){ detail.set(fac.id, "error"); }
      finally{ active--; updateProgress(); scheduleRender(); pumpQueue(); }
    })();
  }
  updateProgress();
}
async function ensureDetail(fac){          // 単体を確実に取得（モーダル/顧客モード用）
  const cur = detail.get(fac.id);
  if(cur && typeof cur === "object") return cur;
  try{
    const doc = parseHTML(await proxyFetch(fac.url));
    const d = parseDetail(doc, fac.id, fac.url);
    if(!d.name) d.name = fac.name||fac.id;
    d.station = (fac.station)||d.access[0]||"";
    d.brand = fac.brand||brandOf(d.name);
    detail.set(fac.id, d);
    return d;
  }catch(e){ detail.set(fac.id,"error"); throw e; }
}

/* ── esc ── */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
const thumbURL = (u,w=280,h=190) => IMG_OK(u) ? (u+"?w="+w+"&h="+h+"&fit=crop&fm=webp") : "";

/* ============================================================
   フィルタUI初期化
   ============================================================ */
(function initFilters(){
  const rSel = $("#fRegion");
  REGIONS.forEach(([r])=> rSel.add(new Option(r, r)));
  rSel.onchange = ()=>{
    state.region = rSel.value; state.pref=""; state.sub="";
    const pSel = $("#fPref"); pSel.innerHTML = '<option value="">選択</option>';
    const prefs = (REGIONS.find(x=>x[0]===state.region)||[null,[]])[1];
    prefs.forEach(p=> pSel.add(new Option(p,p)));
    pSel.disabled = !prefs.length;
    $("#fSub").innerHTML = '<option value="">すべて</option>'; $("#fSub").disabled = true;
    state.results = []; render();
  };
  $("#fPref").onchange = ()=>{ state.pref = $("#fPref").value; state.sub=""; if(state.pref) loadArea(); };
  $("#fSub").onchange = ()=>{ state.sub = $("#fSub").value; loadArea(); };
  $("#fCap").onchange = ()=>{ state.minCap = +$("#fCap").value; render(); };
  let kwT; $("#fKw").oninput = e=>{ clearTimeout(kwT); kwT=setTimeout(()=>{ state.kw = e.target.value.trim(); render(); },180); };

  const bWrap = $("#fBrands");
  BRANDS.forEach(b=>{
    const el = document.createElement("div");
    el.className = "pill"; el.textContent = b; el.dataset.b = b;
    el.onclick = ()=>{ el.classList.toggle("on"); if(state.brands.has(b)) state.brands.delete(b); else state.brands.add(b); render(); };
    bWrap.appendChild(el);
  });
})();

/* ============================================================
   エリア取得
   ============================================================ */
async function loadArea(){
  const token = ++state.areaToken;
  state.results = [];
  detail.clear(); dq = [];       // 新エリアで詳細キャッシュをリセット
  setBusy(true, "会場を取得中…");
  grid.innerHTML = "";
  countEl.textContent = "取得中…";
  let url;
  if(state.sub) url = BASE + state.sub;
  else url = BASE + "/area/" + PREF_PATH[state.pref] + "/";
  try{
    const doc = parseHTML(await proxyFetch(url));
    if(token !== state.areaToken) return;      // 途中で切替られた
    // サブエリア（都道府県ページからのみ）
    if(!state.sub){
      const subs = parseSubAreas(doc, PREF_PATH[state.pref]);
      const sSel = $("#fSub"); sSel.innerHTML = '<option value="">すべて</option>';
      subs.forEach(s=> sSel.add(new Option(s.name, s.path)));
      sSel.disabled = subs.length===0;
    }
    let facs = parseAreaList(doc);
    const seen = new Set(facs.map(f=>f.id));
    state.results = facs;
    facs.forEach(enqueueDetail);
    render();
    // 残りページをバックグラウンド取得（都道府県ページのみ）
    if(!state.sub){
      const maxPage = getMaxPage(doc);
      for(let p=2;p<=maxPage;p++){
        if(token !== state.areaToken) return;
        try{
          const d2 = parseHTML(await proxyFetch(url+"?page="+p));
          if(token !== state.areaToken) return;
          parseAreaList(d2).forEach(f=>{ if(!seen.has(f.id)){ seen.add(f.id); state.results.push(f); enqueueDetail(f); } });
          render();
        }catch(e){ /* このページはスキップ */ }
      }
    }
    setBusy(false);
    if(!state.results.length){
      grid.innerHTML = '<div class="empty"><div class="big">会場が見つかりませんでした</div><div>別のエリアをお試しください。</div></div>';
    }
  }catch(e){
    if(token !== state.areaToken) return;
    setBusy(false);
    countEl.textContent = "";
    grid.innerHTML = '<div class="errbox"><b>会場の取得に失敗しました。</b><br>データ取得サービス（プロキシ）が混雑・停止している可能性があります。少し待って、下のボタンで再試行してください。<br><br><button class="btn" onclick="loadArea()">🔄 再取得する</button></div>';
  }
}
function setBusy(b, msg){
  if(b){ progEl.classList.remove("hidden"); progEl.innerHTML = '<span class="spin"></span>' + esc(msg||"読み込み中…"); }
  else progEl.classList.add("hidden");
}
function updateProgress(){
  if(!state.results.length) return;
  const total = state.results.length;
  const done = state.results.filter(f=>{ const d = detail.get(f.id); return d && d!=="loading"; }).length;
  if(done < total) setBusy(true, "会場詳細を読み込み中… ("+done+"/"+total+")");
  else setBusy(false);
}

/* ============================================================
   フィルタ適用 & 描画
   ============================================================ */
function passFilter(f){
  const d = detail.get(f.id);
  const det = (d && typeof d==="object") ? d : null;
  if(state.brands.size && !state.brands.has(f.brand)) return false;
  if(state.kw){
    const hay = (f.name+" "+(f.station||"")+" "+((det&&det.address)||"")+" "+((det&&(det.access||[]).join(" "))||"")).toLowerCase();
    if(!hay.includes(state.kw.toLowerCase())) return false;
  }
  if(state.minCap>0){
    if(!det) return false;                 // 詳細未取得は収容条件で保留
    if((det.maxCap||0) < state.minCap) return false;
  }
  return true;
}
let renderScheduled = false;
function scheduleRender(){ if(renderScheduled) return; renderScheduled = true; requestAnimationFrame(()=>{ renderScheduled=false; render(); }); }

function render(){
  renderTray();
  if(state.mode === "customer"){ return; }   // 顧客モードは背景更新で再描画しない（入力フォーカス維持）

  const list = state.results.filter(passFilter);
  countEl.innerHTML = '<b>'+list.length+'</b> 件の会場' + (state.minCap>0?'（収容'+state.minCap+'名以上）':'');

    grid.innerHTML = '<div class="empty"><div class="big">条件に合う会場がありません</div><div>絞り込み条件をゆるめてください。</div></div>';
    return;

function _loadImgViaProxy(purl){
  return new Promise((resolve,reject)=>{
    let done=false;
    const img = new Image(); img.crossOrigin = "anonymous";
    img.onload = ()=>{ if(done) return; done=true;
      try{ const cv=document.createElement("canvas"); cv.width=img.naturalWidth; cv.height=img.naturalHeight; cv.getContext("2d").drawImage(img,0,0); resolve(cv.toDataURL("image/jpeg",0.85)); }
      catch(e){ reject(e); } };
    img.onerror = ()=>{ if(done) return; done=true; reject(new Error("imgerr")); };
    setTimeout(()=>{ if(done) return; done=true; reject(new Error("timeout")); }, 12000);
    img.src = purl;
  });
}
async function imgToDataURL(url){
  for(let i=0;i<PROXIES.length && i<4;i+=2){
    const group = PROXIES.slice(i,i+2).map(mk=>_loadImgViaProxy(mk(url)));
    try{ return await Promise.any(group); }catch(e){}
  }
  return null;
}

/* Google Maps embed の緯度経度から OSM タイルを合成した静的地図画像を生成
   （提案ページ・PPTXで共通利用。scraper.download_map_image のJS移植） */
function latlngFromEmbed(embed){
  if(!embed) return null;
  const mLng = embed.match(/!2d([-\d.]+)/), mLat = embed.match(/!3d([-\d.]+)/);
  if(!mLat || !mLng) return null;
  return {lat:parseFloat(mLat[1]), lng:parseFloat(mLng[1])};
}
async function staticMapDataURL(embed, zoom, cropW, cropH){
  zoom = zoom||15; cropW = cropW||760; cropH = cropH||360;
  const ll = latlngFromEmbed(embed); if(!ll) return null;
  const n = Math.pow(2,zoom), latRad = ll.lat*Math.PI/180;
  const xf = (ll.lng+180)/360*n;
  const yf = (1 - Math.log(Math.tan(latRad)+1/Math.cos(latRad))/Math.PI)/2*n;
  const tx = Math.floor(xf), ty = Math.floor(yf), TILE=256, COLS=3, ROWS=3;
  const canvas = document.createElement("canvas"); canvas.width=TILE*COLS; canvas.height=TILE*ROWS;
  const ctx = canvas.getContext("2d"); ctx.fillStyle="#e5e3dc"; ctx.fillRect(0,0,canvas.width,canvas.height);
  await Promise.all([0,1,2].flatMap(row=>[0,1,2].map(col=>new Promise(res=>{
    let done=false; const fin=()=>{ if(done) return; done=true; res(); };
    const img = new Image(); img.crossOrigin="anonymous";
    img.onload=()=>{ try{ ctx.drawImage(img,col*TILE,row*TILE);}catch(e){} fin(); };
    img.onerror=fin;
    setTimeout(fin, 8000);
    img.src = "https://tile.openstreetmap.org/"+zoom+"/"+(tx+col-1)+"/"+(ty+row-1)+".png";
  }))));
  const cx = (xf-tx+1)*TILE, cy = (yf-ty+1)*TILE;
  const left = Math.max(0,Math.min(TILE*COLS-cropW, cx-cropW/2)), top = Math.max(0,Math.min(TILE*ROWS-cropH, cy-cropH/2));
  const out = document.createElement("canvas"); out.width=cropW; out.height=cropH;
  const o = out.getContext("2d");
  o.drawImage(canvas,left,top,cropW,cropH,0,0,cropW,cropH);
  const mx=cx-left, my=cy-top;
  o.beginPath(); o.arc(mx,my,9,0,Math.PI*2); o.fillStyle="#D90012"; o.fill(); o.lineWidth=2; o.strokeStyle="#fff"; o.stroke();
  o.beginPath(); o.arc(mx,my,3,0,Math.PI*2); o.fillStyle="#fff"; o.fill();
  try{ return out.toDataURL("image/jpeg",0.85); }catch(e){ return null; }
}
async function ensureMapImg(d){
  if(d.mapImg!==undefined) return d.mapImg;
  let img = null;
  // 1) サイト掲載のイラストアクセスマップ（/access/ ページの Access_*.webp）
  try{
    const html = await proxyFetch(d.url.replace(/\/+$/,"") + "/access/");
    const m = html.match(/https:\/\/[^"'\s)]+Access_[0-9A-Za-z_\-]+\.(?:webp|jpg|jpeg|png)/i);
    if(m) img = m[0];
  }catch(e){}
  // 2) フォールバック: OSMタイル合成の静的地図
  if(!img && d.mapEmbed){ img = await staticMapDataURL(d.mapEmbed); }
  d.mapImg = img || null;
  return d.mapImg;
}
/* PPTX用: 地図をJPEG dataURLで返す（URL(webp)ならcanvasでJPEG化） */
async function mapImgForPPTX(d){
  const mi = await ensureMapImg(d);
  if(!mi) return null;
  if(mi.indexOf("data:")===0) return mi;
  return await imgToDataURL(mi);
}
let _onestopData;
async function onestopDataURL(){
  if(_onestopData!==undefined) return _onestopData;
  _onestopData = await new Promise(res=>{
    let done=false; const fin=v=>{ if(done) return; done=true; res(v); };
    const im = new Image();
    im.onload = ()=>{ try{ const cv=document.createElement("canvas"); cv.width=im.naturalWidth; cv.height=im.naturalHeight; cv.getContext("2d").drawImage(im,0,0); fin(cv.toDataURL("image/jpeg",0.85)); }catch(e){ fin(null); } };
    im.onerror = ()=>fin(null);
    setTimeout(()=>fin(null), 10000);
    im.src = "onestop.jpg";
  });
  return _onestopData;
}

      s.addText(m[1]||"—",{x,y:5.45,w:2.8,h:0.4,fontSize:13,color:INK,fontFace:BODY});
    });
    s.addText("TKP",{x:0.9,y:6.7,w:3,h:0.4,fontSize:16,bold:true,color:RED,fontFace:HEAD});

    /* ── 比較 ── */
    if(dets.length>=2){
      s = pptx.addSlide(); s.background = {color:BG};
      s.addText("COMPARISON",{x:0.62,y:0.4,w:12,h:0.3,fontSize:10,color:GOLD,fontFace:BODY,charSpacing:3});
      s.addText("会場比較",{x:0.6,y:0.68,w:12,h:0.7,fontSize:26,color:INK,fontFace:HEAD,bold:true});
      const areaOf = d => d.rooms.reduce((m,r)=>Math.max(m,r.area||0),0);
      const priceOf = d => { const ps=d.rooms.filter(r=>r.priceMin>0).map(r=>r.priceMin); return ps.length?Math.min(...ps):0; };
      const headRow = [{text:"",options:{fill:{color:BG}}}].concat(dets.map(d=>({text:d.name,options:{bold:true,color:INK,fontFace:HEAD,fontSize:13,fill:{color:W},align:"center",valign:"middle"}})));
      const rowsData = [
        ["最大収容", dets.map(d=>d.maxCap? d.maxCap+" 名":"—")],
        ["最大面積", dets.map(d=>{const a=areaOf(d);return a? a+" ㎡":"—";})],
        ["会議室数", dets.map(d=>(d.roomCount||"—")+" 室")],
        ["最寄", dets.map(d=>(d.station||(d.access[0]||"—")).split("\n")[0])],
        ["料金（最小/時）", dets.map(d=>{const p=priceOf(d);return p? yen(p):"—";})],
      ];
      const tbl = [headRow];
      rowsData.forEach(rd=>{
        tbl.push([{text:rd[0],options:{bold:true,color:FAINT,fontSize:11,fontFace:BODY,fill:{color:BG},valign:"middle"}}]
          .concat(rd[1].map(v=>({text:String(v),options:{color:INK,fontSize:12,fontFace:BODY,align:"center",valign:"middle",fill:{color:W}}}))));
      });
      const restW = (12.1-2.3)/dets.length;
      s.addTable(tbl,{x:0.6,y:1.55,rowH:0.62,border:{type:"solid",color:LINE,pt:1},colW:[2.3].concat(dets.map(()=>restW))});
    }

    /* ── 会場ごと（提案ページのレイアウトを踏襲）── */
    for(let i=0;i<dets.length;i++){
      const d = dets[i];
      const chosen = roomsToShow(d);
      s = pptx.addSlide(); s.background = {color:W};
      s.addText(String(i+1).padStart(2,"0"),{x:0.55,y:0.4,w:0.9,h:0.7,fontSize:26,color:GOLD,fontFace:HEAD,bold:true});
      s.addText(d.name,{x:1.4,y:0.46,w:11.4,h:0.7,fontSize:22,color:INK,fontFace:HEAD,bold:true});
      const subline = [d.brand||"", (d.station?"｜  "+(d.station||"").split("\n")[0]:""), (d.maxCap?"｜  最大 "+d.maxCap+"名":"")].filter(Boolean).join("　");
      s.addText(subline,{x:1.42,y:1.1,w:11.4,h:0.35,fontSize:11,color:GRAY,fontFace:BODY});
      /* 左：写真＋地図 */
      const imgData = d.images.length ? await imgToDataURL(d.images[0]+"?w=1100&h=760&fit=crop&fm=jpg") : null;
      if(imgData) s.addImage({data:imgData,x:0.55,y:1.65,w:5.65,h:3.05,sizing:{type:"cover",w:5.65,h:3.05}});
      else s.addShape(pptx.ShapeType.rect,{x:0.55,y:1.65,w:5.65,h:3.05,fill:{color:"F0EEE7"}});
      const mapData = await mapImgForPPTX(d);
      if(mapData) s.addImage({data:mapData,x:0.55,y:4.85,w:5.65,h:2.0,sizing:{type:"cover",w:5.65,h:2.0}});
      /* 右：紹介＋設備＋住所＋会議室 */
      const rx = 6.5, rw = 6.3;
      let ry = 1.65;
      if(d.description){ s.addText(d.description,{x:rx,y:ry,w:rw,h:1.15,fontSize:9.5,color:GRAY,fontFace:BODY,valign:"top",lineSpacingMultiple:1.15}); ry += 1.2; }
      if(d.features && d.features.length){ s.addText(d.features.slice(0,6).join("　・　"),{x:rx,y:ry,w:rw,h:0.35,fontSize:9,color:GOLD,fontFace:BODY,valign:"top"}); ry += 0.4; }
      if(d.address){ s.addText([{text:"▸ ",options:{color:RED}},{text:d.address,options:{color:GRAY}}],{x:rx,y:ry,w:rw,h:0.45,fontSize:9,fontFace:BODY,valign:"top"}); ry += 0.5; }
      const cols = LAYOUT_ORDER.filter(l=>chosen.some(r=>(r.caps[l]||0)>0)).slice(0,4);
      s.addText("会議室スペック"+(chosen.length!==d.rooms.length?"（ご希望の "+chosen.length+" 室）":"（"+d.rooms.length+" 室）"),{x:rx,y:ry,w:rw,h:0.3,fontSize:11,color:GOLD,fontFace:BODY,bold:true}); ry += 0.36;
      if(chosen.length){
        const th = ["会議室","面積"].concat(cols).concat(["料金/時"]).map(t=>({text:t,options:{bold:true,color:FAINT,fontSize:9,fontFace:BODY,fill:{color:"F4F2EC"},align:"center",valign:"middle"}}));
        const rows = chosen.slice(0,7);
        const bodyRows = rows.map(r=>[
          {text:r.name,options:{color:INK,fontSize:9,fontFace:BODY,bold:true,valign:"middle"}},
          {text:r.area?r.area+"㎡":"—",options:{color:GRAY,fontSize:9,fontFace:BODY,align:"center",valign:"middle"}}
        ].concat(cols.map(c=>({text:(r.caps[c]||0)?r.caps[c]+"名":"—",options:{color:GRAY,fontSize:9,fontFace:BODY,align:"center",valign:"middle"}})))
         .concat([{text:roomPrice(r),options:{color:RED,fontSize:9,fontFace:BODY,align:"right",valign:"middle"}}]));
        s.addTable([th].concat(bodyRows),{x:rx,y:ry,w:rw,border:{type:"solid",color:LINE,pt:0.5},autoPage:false});
        if(chosen.length>7) s.addText("ほか "+(chosen.length-7)+" 室",{x:rx,y:6.95,w:rw,h:0.3,fontSize:9,color:FAINT,fontFace:BODY});
      } else s.addText("会議室情報を取得できませんでした",{x:rx,y:ry,w:rw,h:0.4,fontSize:11,color:FAINT,fontFace:BODY});
    }

    /* ── ワンストップサービス（提案フォルダのスライドを画像として組込・明るい背景）── */
    const osData = await onestopDataURL();
    if(osData){
      s = pptx.addSlide(); s.background = {color:BG};
      s.addText("ONE-STOP SERVICE",{x:0.62,y:0.4,w:12,h:0.3,fontSize:10,color:GOLD,fontFace:BODY,charSpacing:3});
      s.addText("TKPのワンストップサービス",{x:0.6,y:0.68,w:12,h:0.7,fontSize:26,color:INK,fontFace:HEAD,bold:true});
      const iw = 9.8, ih = iw*1012/1800;
      s.addImage({data:osData,x:(13.333-iw)/2,y:1.7,w:iw,h:ih});
    }

    /* ── お問い合わせ（カバーと同じ明るい背景）── */
    s = pptx.addSlide(); s.background = {color:W};
    s.addText("CONTACT",{x:0.9,y:2.2,w:11.5,h:0.3,fontSize:10,color:GOLD,fontFace:BODY,charSpacing:3});
    s.addText("貴社に最適な会場を、ワンストップでご提案します。",{x:0.9,y:2.55,w:11.5,h:1,fontSize:24,color:INK,fontFace:HEAD,bold:true});
    s.addText("会場のご手配から運営・ケータリングまで。ご不明点はお気軽にご相談ください。",{x:0.9,y:3.7,w:11.5,h:0.5,fontSize:13,color:GRAY,fontFace:BODY});
    s.addShape(pptx.ShapeType.line,{x:0.92,y:4.5,w:5,h:0,line:{color:LINE,width:1}});
    const cinfo = [state.repOrg||"TKP 営業部", state.repName||"", state.repTel||""].filter(Boolean).join("　｜　");
    s.addText(cinfo,{x:0.9,y:4.75,w:11.5,h:0.5,fontSize:13,color:INK,fontFace:BODY});
    s.addText("TKP",{x:0.9,y:6.5,w:3,h:0.5,fontSize:18,bold:true,color:RED,fontFace:HEAD});

    const safeClient = (state.client||"御中").replace(/\s+/g,"").replace(/[\/\\:*?"<>|]/g,"");
    const nd = new Date();
    const ymd = nd.getFullYear()+String(nd.getMonth()+1).padStart(2,"0")+String(nd.getDate()).padStart(2,"0");
    await pptx.writeFile({fileName:"TKP提案書_"+safeClient+"_"+ymd+".pptx"});
    toast("PPTXをダウンロードしました");
  }catch(e){
    console.error("PPTX error", e);
    toast("PPTX生成に失敗しました");
  }finally{
    btn.textContent = old; btn.disabled = false;
  }
}

let custRendering = false;
let custDets = [];
async function renderCustomer(){
  const box = $("#custContent");
  const sel = [...state.selected.values()];
  if(!sel.length){ box.innerHTML = ""; return; }
  const today = state.pdate || new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"});
  // cover
  box.innerHTML =
    '<div class="cover">'+
      '<div class="ey">TKP  Meeting Room  Proposal</div>'+
      '<h1>会議室 ご提案</h1>'+
      '<div class="to"><input id="cClient" placeholder="〇〇株式会社 御中" value="'+esc(state.client)+'"></div>'+
      '<div class="meta">'+
        '<div><span class="label">ご提案日</span><input id="cDate" value="'+esc(today)+'"></div>'+
        '<div><span class="label">ご担当</span><input id="cRep" placeholder="担当者名" value="'+esc(state.repName)+'"></div>'+
        '<div><span class="label">所属</span><input id="cOrg" value="'+esc(state.repOrg)+'"></div>'+
        '<div><span class="label">連絡先</span><input id="cTel" placeholder="TEL / Email" value="'+esc(state.repTel)+'"></div>'+
      '</div>'+
    '</div>'+
    '<div id="custBody"><div style="padding:60px;text-align:center;color:var(--ink-faint)"><span class="spin"></span><div style="margin-top:12px">会場情報を準備中…</div></div></div>';
  // bind inputs
  const bind = (id,key)=>{ const el=$("#"+id); if(el) el.oninput = ()=>{ state[key]=el.value; syncHash(); }; };
  bind("cClient","client"); bind("cDate","pdate"); bind("cRep","repName"); bind("cOrg","repOrg"); bind("cTel","repTel");

  if(custRendering) return; custRendering = true;
  // ensure details
  const dets = [];
  for(const f of sel){
    try{ dets.push(await ensureDetail(f)); }
    catch(e){ dets.push({...f, images:[], rooms:[], access:[], features:[], maxCap:0, roomCount:0, address:"", description:"", mapEmbed:""}); }
    if(state.mode!=="customer"){ custRendering=false; return; }
  }
  custRendering = false;
  custDets = dets;
  const body = $("#custBody"); if(!body) return;
  let html = "";
  if(dets.length>=2) html += comparisonHTML(dets);
  html += dets.map((d,i)=>venueBlockHTML(d,i)).join("");
  html += '<div class="cust-sec onestop-sec"><span class="label">One-Stop Service</span><h2>TKPのワンストップサービス</h2>'+
          '<p style="color:var(--ink-soft);margin:0 0 20px">会場のご手配から運営・ケータリングまで、貴社のイベントをワンストップでご支援します。</p>'+
          '<img class="onestop-img" src="onestop.jpg" alt="TKPのワンストップサービス"></div>';
  html += '<div class="cust-sec" style="border-bottom:none;text-align:center"><span class="label">お問い合わせ</span><h2 style="margin-bottom:8px">貴社に最適な会場を、ワンストップでご提案します。</h2><p style="color:var(--ink-soft)">会場のご手配から運営・ケータリングまで。ご不明点はお気軽にご相談ください。</p></div>';
  body.innerHTML = html;
  // 静的地図を非同期生成して各会場にはめ込み（提案ページ・PPTX共通の地図）
  dets.forEach(async d=>{
    if(!d.mapEmbed) return;
    const mi = await ensureMapImg(d);
    const el = document.getElementById("vmap-"+d.id);
    if(el){ if(mi) el.innerHTML='<img class="mapimg" src="'+mi+'" alt="地図">'; else el.remove(); }
  });
}
function comparisonHTML(dets){
  const maxCapBest = Math.max(...dets.map(d=>d.maxCap||0));
  const areaOf = d => d.rooms.reduce((m,r)=>Math.max(m,r.area||0),0);
  const areaBest = Math.max(...dets.map(areaOf));
  const priceOf = d => { const ps = d.rooms.filter(r=>r.priceMin>0).map(r=>r.priceMin); return ps.length?Math.min(...ps):0; };
  return '<div class="cust-sec"><span class="label">Comparison</span><h2>会場比較</h2>'+
    '<div class="cmp-wrap"><table class="cmp"><thead><tr><th></th>'+dets.map(d=>'<td>'+esc(d.name)+'</td>').join("")+'</tr></thead>'+
    '<tbody>'+
      '<tr><th>最大収容</th>'+dets.map(d=>'<td><span class="big '+((d.maxCap===maxCapBest&&maxCapBest>0)?"best":"")+'">'+(d.maxCap||"—")+'</span><span class="sm">名</span></td>').join("")+'</tr>'+
      '<tr><th>最大面積</th>'+dets.map(d=>{const a=areaOf(d);return '<td><span class="big '+((a===areaBest&&areaBest>0)?"best":"")+'">'+(a||"—")+'</span><span class="sm">㎡</span></td>';}).join("")+'</tr>'+
      '<tr><th>会議室数</th>'+dets.map(d=>'<td>'+(d.roomCount||"—")+' 室</td>').join("")+'</tr>'+
      '<tr><th>最寄</th>'+dets.map(d=>'<td style="font-size:11.5px">'+esc((d.station||(d.access[0]||"—")).split("\n")[0])+'</td>').join("")+'</tr>'+
      '<tr><th>料金（最小/時）</th>'+dets.map(d=>{const p=priceOf(d);return '<td>'+(p?esc(yen(p)):"—")+'</td>';}).join("")+'</tr>'+
    '</tbody></table></div></div>';
}
function venueBlockHTML(d, i){
  const sel = state.selected.get(d.id);
  const isOn = name => !sel || !sel.rooms || sel.rooms.size===0 || sel.rooms.has(name);
  const chosenCount = d.rooms.filter(r=>isOn(r.name)).length;
  const cols = LAYOUT_ORDER.filter(l => d.rooms.some(r => isOn(r.name) && (r.caps[l]||0)>0)).slice(0,4);
  const photos = d.images.slice(1,5);
  const idJs = esc(d.id).replace(/'/g,"\\'");
  const rows = d.rooms.slice(0,12);
  const table = d.rooms.length ? (
    '<div class="roomcap">'+(chosenCount!==d.rooms.length?"ご希望の "+chosenCount+" 室":"会議室 "+d.rooms.length+" 室")+'<span class="roomedit-hint print-hide"> ・ チェックで表示／PPTX反映</span> <button class="roomselall print-hide" onclick="selectAllRooms(\''+idJs+'\',true)">全選択</button> <button class="roomselall print-hide" onclick="selectAllRooms(\''+idJs+'\',false)">全解除</button></div>'+
    '<div class="rooms-wrap"><table class="rooms"><thead><tr><th class="print-hide">利用</th><th>会議室</th><th>面積</th>'+cols.map(c=>'<th>'+esc(c)+'</th>').join("")+'<th>料金/時</th></tr></thead><tbody>'+
      rows.map(r=>'<tr class="'+(isOn(r.name)?"":"row-off")+'">'+
        '<td class="rmchk print-hide"><input type="checkbox" '+(isOn(r.name)?"checked":"")+' data-rn="'+esc(r.name)+'" onchange="toggleRoom(\''+idJs+'\', this.dataset.rn)"></td>'+
        '<td class="nm">'+esc(r.name)+'</td><td>'+(r.area?esc(r.area)+"㎡":"—")+'</td>'+cols.map(c=>'<td>'+((r.caps[c]||0)?esc(r.caps[c])+"名":"—")+'</td>').join("")+'<td class="pr">'+esc(roomPrice(r))+'</td></tr>').join("")+
    '</tbody></table></div>'+
    (d.rooms.length>12?'<div class="roomcap" style="margin-top:6px;color:var(--ink-faint)">ほか '+(d.rooms.length-12)+' 室</div>':'')
  ) : '<p style="color:var(--ink-faint)">会議室情報を取得できませんでした。</p>';
  return '<div class="venue-block" id="vblock-'+esc(d.id)+'">'+
    '<div class="vn"><span class="num">'+String(i+1).padStart(2,"0")+'</span><h2>'+esc(d.name)+'</h2></div>'+
    '<div class="vsub">'+esc(d.brand||"")+(d.station?'　｜　▸ '+esc((d.station||"").split("\n")[0]):"")+(d.maxCap?'　｜　最大 '+d.maxCap+'名':"")+'</div>'+
    '<div class="vgrid">'+
      '<div>'+
        (d.images.length? '<div class="photo"><img src="'+esc(d.images[0]+"?w=760&h=560&fit=crop&fm=webp")+'" alt=""></div>':'<div class="photo"></div>')+
        (photos.length? '<div class="vphotos">'+photos.map(u=>'<img src="'+esc(thumbURL(u,360,240))+'" alt="">').join("")+'</div>':'')+
        (d.address? '<div class="acc" style="margin-top:12px"><div class="addr"><i>▸</i> '+esc(d.address)+'</div>'+d.access.slice(0,2).map(a=>'<div class="acc-line">'+esc(a.replace(/\n/g," / "))+'</div>').join("")+'</div>':'')+
        (d.mapEmbed? '<div class="vmap" id="vmap-'+esc(d.id)+'"></div>':'')+
      '</div>'+
      '<div>'+
        (d.description? '<div class="desc" style="margin-bottom:16px">'+esc(d.description)+'</div>':'')+
        (d.features.length? '<div class="tags" style="margin-bottom:16px">'+d.features.slice(0,6).map(t=>'<span class="tag">'+esc(t)+'</span>').join("")+'</div>':'')+
        table+
      '</div>'+
    '</div>'+
  '</div>';
}
function rerenderVenueBlock(id){
  const idx = custDets.findIndex(d=>d.id===id);
  if(idx<0) return;
  const el = document.getElementById("vblock-"+id);
  if(!el) return;
  el.outerHTML = venueBlockHTML(custDets[idx], idx);
  const d = custDets[idx];
  if(d.mapImg){ const m=document.getElementById("vmap-"+id); if(m) m.innerHTML='<img class="mapimg" src="'+d.mapImg+'" alt="地図">'; }
}

/* ============================================================
   共有URL（ハッシュ）
   ============================================================ */
function syncHash(){
  const p = new URLSearchParams();
  if(state.pref) p.set("pref", state.pref);
  if(state.sub) p.set("sub", state.sub);
  if(state.selected.size) p.set("ids", [...state.selected.keys()].join(","));
  if(state.mode==="customer") p.set("mode","customer");
  if(state.client) p.set("client", state.client);
  if(state.repName) p.set("rep", state.repName);
  history.replaceState(null,"","#"+p.toString());
}
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2200); }
function doShare(){
  syncHash();
  const url = location.href;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>toast("共有URLをコピーしました"),()=>prompt("共有URL", url));
  }else prompt("共有URL", url);
}
$("#shareBtn").onclick = doShare;

async function restoreFromHash(){
  const h = location.hash.replace(/^#/,"");
  if(!h) return;
  const p = new URLSearchParams(h);
  if(p.get("client")) state.client = p.get("client");
  if(p.get("rep")) state.repName = p.get("rep");
  const ids = (p.get("ids")||"").split(",").filter(Boolean);
  ids.forEach(id=> state.selected.set(id, {id, name:id, url:BASE+"/facilitys/"+id+"/", brand:"その他", station:""}));
  // pref を復元して一覧取得（会場名を埋めるため）
  const pref = p.get("pref");
  if(pref && PREF_PATH[pref]){
    const region = REGIONS.find(r=>r[1].includes(pref));
    if(region){
      state.region = region[0]; $("#fRegion").value = region[0]; $("#fRegion").onchange();
      state.pref = pref; $("#fPref").value = pref;
      if(p.get("sub")) state.sub = p.get("sub");
      await loadArea();
      // 一覧から選択会場の名前を補完
      ids.forEach(id=>{ const f = state.results.find(x=>x.id===id); if(f && state.selected.has(id)) state.selected.set(id, {id:f.id,name:f.name,station:f.station,brand:f.brand,url:f.url}); });
    }
  }
  // 選択会場の詳細を取得して名前補完
  for(const id of ids){ try{ const d = await ensureDetail(state.selected.get(id)); const cur = state.selected.get(id); if(cur){ cur.name = d.name||cur.name; cur.brand = d.brand||cur.brand; } }catch(e){} }
  if(p.get("mode")==="customer" && state.selected.size){ enterCustomer(); }
  else render();
}

/* ── init ── */
buildTray();
render();
restoreFromHash();
